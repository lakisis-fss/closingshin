version: '3.8'

services:
  # 1. Database (PocketBase)
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: pocketbase
    ports:
      - "8090:8080"
    volumes:
      - ./pb_data:/pb_data
    environment:
      - TZ=Asia/Seoul
    command: serve --http=0.0.0.0:8080 --dir=/pb_data
    restart: unless-stopped

  # 2. Main App (Next.js + Python Scheduler)
  closingshin:
    build: .
    container_name: closingshin
    depends_on:
      - pocketbase
    ports:
      - "3000:3000"
      - "3001:3001"
    volumes:
      - ./Scripts/data:/app/Scripts/data
      - ./Scripts/results:/app/Scripts/results
      - ./.env:/app/.env:ro
    environment:
      - NODE_ENV=production
      - TZ=Asia/Seoul
      - PB_URL=http://pocketbase:8080 # 컨테이너 내부간 통신
      - NEXT_PUBLIC_PB_URL=http://144.30.13.60:8090 # 브라우저 접속용 URL
    restart: unless-stopped
